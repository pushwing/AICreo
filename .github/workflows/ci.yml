name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: PHP ${{ matrix.php }} - 정적분석 · 스타일 · 테스트
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ci4_agency_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      database.tests.hostname: 127.0.0.1
      database.tests.database: ci4_agency_test
      database.tests.username: root
      database.tests.password: root
      database.tests.DBDriver: MySQLi
      database.tests.port: 3306

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, mbstring, mysqli
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Code style (php-cs-fixer)
        run: composer cs

      - name: Static analysis (PHPStan)
        run: composer analyse

      - name: Tests (PHPUnit)
        run: composer test

  coverage:
    name: 커버리지 리포트
    runs-on: ubuntu-latest
    # 커버리지는 dev·main push 시에만 실행 — PR CI 대기 시간을 quality 잡만으로 단축.
    # 커버리지 결과는 push 후 job summary에서 확인한다.
    if: github.event_name == 'push'

    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ci4_agency_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      database.tests.hostname: 127.0.0.1
      database.tests.database: ci4_agency_test
      database.tests.username: root
      database.tests.password: root
      database.tests.DBDriver: MySQLi
      database.tests.port: 3306

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, mbstring, mysqli
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Tests with coverage
        run: |
          mkdir -p build
          vendor/bin/phpunit \
            --coverage-text=build/coverage.txt \
            --coverage-cobertura=build/cobertura.xml

      - name: Append coverage to job summary
        if: always()
        run: |
          {
            echo '### 📊 커버리지'
            echo '```'
            cat build/coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Slack 알림
    runs-on: ubuntu-latest
    needs: [quality, coverage]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Slack 알림 전송
        uses: ./.github/actions/slack-notify
        with:
          # coverage는 PR에서 skip되므로(push 전용) skipped도 성공으로 간주한다.
          status: ${{ (needs.quality.result == 'success' && (needs.coverage.result == 'success' || needs.coverage.result == 'skipped')) && 'success' || 'failure' }}
          title: CI
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
